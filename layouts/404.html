<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Rambling Rover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  {{ partial "nav.html" . }}
  <main class="page-body">
    <div style="min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
      <div>
        <p style="font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--forest);margin-bottom:1rem;">
          Lost on the trail
        </p>
        <h1 style="font-family:var(--font-display);font-size:clamp(3rem,10vw,8rem);font-weight:300;
                   line-height:1;color:var(--ink);margin-bottom:1.5rem;">404</h1>
        <p style="color:var(--ink-mid);max-width:380px;margin:0 auto 2.5rem;">
          Looks like this path doesn't lead anywhere. Even the best trail maps have blank spots.
        </p>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
          <a href="/" class="btn btn--primary">Back to home</a>
          <a href="/posts/" class="btn btn--outline">Browse the journal</a>
        </div>
      </div>
    </div>
  </main>
  {{ partial "footer.html" . }}
  <script src="/js/gallery.js"></script>
</body>
</html>
