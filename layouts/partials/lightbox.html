<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <button class="lightbox__close" id="lightbox-close" aria-label="Close">&times;</button>
  <button class="lightbox__nav lightbox__prev" id="lightbox-prev" aria-label="Previous">&#8592;</button>
  <img class="lightbox__img" id="lightbox-img" src="" alt="" />
  <button class="lightbox__nav lightbox__next" id="lightbox-next" aria-label="Next">&#8594;</button>
  <div class="lightbox__caption" id="lightbox-caption"></div>
</div>
